<div class="profile-page">
    @if (authService.user(); as user) {
    <div class="profile-card card animate-fade-in">
        <div class="avatar">{{ user.identifiant[0].toUpperCase() }}</div>
        <h1>{{ user.identifiant }}</h1>
        <p class="role">Utilisateur système (#{{ user.id_utilisateur }})</p>

        <button class="btn btn--danger btn--full btn--lg" style="margin-top: var(--space-xl);"
            (click)="authService.logout()">Déconnexion</button>
    </div>
    }
</div>
