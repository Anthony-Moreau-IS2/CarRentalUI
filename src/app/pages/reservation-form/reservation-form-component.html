<div class="page-container page-container--narrow" style="margin-top: var(--space-2xl);">
    <div class="card">
        <h2 class="card__title">Nouvelle Réservation</h2>
        <p class="card__subtitle">Véhicule #{{ carId() }}</p>

        <form (ngSubmit)="submit()">
            <div class="form-group">
                <label class="form-label" for="startDate">Date de début</label>
                <input class="form-input" type="date" id="startDate" [ngModel]="startDate()"
                    (ngModelChange)="startDate.set($event)" name="startDate" required />
            </div>

            <div class="form-group">
                <label class="form-label" for="endDate">Date de fin</label>
                <input class="form-input" type="date" id="endDate" [ngModel]="endDate()"
                    (ngModelChange)="endDate.set($event)" name="endDate" required />
            </div>

            <button type="submit" class="btn btn--primary btn--lg btn--full" [disabled]="submitting()">
                @if (submitting()) {
                Réservation en cours...
                } @else {
                Confirmer la réservation
                }
            </button>
        </form>
    </div>
</div>
