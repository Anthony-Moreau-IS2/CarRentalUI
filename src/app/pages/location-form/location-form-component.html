<div class="page-container">
    <div class="location-form-container">
        <div class="form-header">
            <h1 class="page-title">Nouvelle Location</h1>
            <p class="page-subtitle">Enregistrez une nouvelle location de véhicule pour un client.</p>
        </div>

        <div class="form-card animate-scale-up">
            <form (ngSubmit)="submit()">
                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label" for="clientId">Client</label>
                        <select class="form-input" id="clientId" [ngModel]="clientId()"
                            (ngModelChange)="clientId.set($event)" name="clientId" required>
                            <option [ngValue]="null" disabled selected>Sélectionner un client</option>
                            @for (client of clients(); track client.id_client) {
                            <option [ngValue]="client.id_client">{{ client.nom }} (#{{ client.id_client }})</option>
                            }
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="vehiculeId">Véhicule</label>
                        <select class="form-input" id="vehiculeId" [ngModel]="vehiculeId()"
                            (ngModelChange)="vehiculeId.set($event)" name="vehiculeId" required>
                            <option [ngValue]="null" disabled selected>Sélectionner un véhicule</option>
                            @for (vehicule of vehicules(); track vehicule.id_vehicule) {
                            <option [ngValue]="vehicule.id_vehicule">{{ vehicule.marque }} {{ vehicule.modele }} ({{
                                vehicule.immatriculation }})</option>
                            }
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="dateDebut">Date de début</label>
                        <input class="form-input" type="date" id="dateDebut" [ngModel]="dateDebut()"
                            (ngModelChange)="dateDebut.set($event)" name="dateDebut" required />
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="dateFin">Date de fin</label>
                        <input class="form-input" type="date" id="dateFin" [ngModel]="dateFin()"
                            (ngModelChange)="dateFin.set($event)" name="dateFin" required />
                    </div>

                    @if (getTotalPrice() > 0) {
                    <div class="price-summary animate-fade-in">
                        <span>Estimation du prix total :</span>
                        <span class="price-total">{{ getTotalPrice() }} €</span>
                    </div>
                    }
                </div>

                <div class="form-footer">
                    <button type="button" routerLink="/locations" class="btn btn--secondary">Annuler</button>
                    <button type="submit" class="btn btn--primary" [disabled]="submitting()">
                        {{ submitting() ? 'Création...' : 'Créer la location' }}
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
