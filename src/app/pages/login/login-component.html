<!-- Login — refactored to use design system classes -->
<div class="page-center">
    <div class="card" style="--card-max-width: 440px; width: 100%; max-width: var(--card-max-width);">
        <h2 class="card__title">Connexion</h2>
        <p class="card__subtitle">Connectez-vous à votre compte CarRental.</p>

        <form (ngSubmit)="submit()">
            <div class="form-group">
                <label class="form-label" for="identifiant">Identifiant</label>
                <input class="form-input" type="text" id="identifiant" [ngModel]="identifiant()"
                    (ngModelChange)="identifiant.set($event)" name="identifiant" placeholder="admin" required />
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Mot de passe</label>
                <input class="form-input" type="password" id="password" [ngModel]="motDePasse()"
                    (ngModelChange)="motDePasse.set($event)" name="motDePasse" placeholder="••••••••" required />
            </div>

            <button type="submit" class="btn btn--primary btn--lg btn--full" [disabled]="submitting()">
                @if (submitting()) {
                Connexion en cours...
                } @else {
                Se connecter
                }
            </button>
        </form>
    </div>
</div>
