<div class="page-center">
    <div class="card" style="width: 100%; max-width: var(--container-form);">
        <h2 class="card__title">Créer un compte</h2>
        <p class="card__subtitle">Rejoignez CarRental pour réserver vos véhicules.</p>

        <form (ngSubmit)="submit()">
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label" for="firstName">Prénom</label>
                    <input class="form-input" type="text" id="firstName" [ngModel]="firstName()"
                        (ngModelChange)="firstName.set($event)" name="firstName" required />
                </div>
                <div class="form-group">
                    <label class="form-label" for="lastName">Nom</label>
                    <input class="form-input" type="text" id="lastName" [ngModel]="lastName()"
                        (ngModelChange)="lastName.set($event)" name="lastName" required />
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" for="email">Email</label>
                <input class="form-input" type="email" id="email" [ngModel]="email()"
                    (ngModelChange)="email.set($event)" name="email" placeholder="votre@email.com" required />
            </div>

            <div class="form-group">
                <label class="form-label" for="phone">Téléphone (optionnel)</label>
                <input class="form-input" type="tel" id="phone" [ngModel]="phone()" (ngModelChange)="phone.set($event)"
                    name="phone" placeholder="+33 6 12 34 56 78" />
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Mot de passe</label>
                <input class="form-input" type="password" id="password" [ngModel]="password()"
                    (ngModelChange)="password.set($event)" name="password" placeholder="••••••••" required />
            </div>

            <button type="submit" class="btn btn--primary btn--lg btn--full" [disabled]="submitting()">
                @if (submitting()) {
                Création en cours...
                } @else {
                Créer mon compte
                }
            </button>
        </form>

        <p class="form-link">
            Déjà un compte ? <a routerLink="/login">Se connecter</a>
        </p>
    </div>
</div>
